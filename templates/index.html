<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endpoint Asset Governance Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-work: #38bdf8;
            --accent-personal: #fb7185;
            --accent-security: #facc15;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .work { color: var(--accent-work); }
        .personal { color: var(--accent-personal); }
        .security { color: var(--accent-security); }

        .log-section {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .bg-work { background-color: rgba(56, 189, 248, 0.2); color: var(--accent-work); }
        .bg-personal { background-color: rgba(251, 113, 133, 0.2); color: var(--accent-personal); }
        .bg-security { background-color: rgba(250, 204, 21, 0.2); color: var(--accent-security); }

        .refresh-btn {
            background: #818cf8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .refresh-btn:hover { background: #6366f1; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Asset Governance Engine</h1>
            <p style="color: var(--text-secondary)">분류 및 보안 거버넌스 실시간 현황</p>
        </header>

        <button class="refresh-btn" onclick="fetchStats()">새로고침</button>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">전체 자산</div>
                <div class="stat-value" id="total-val">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">업무용 자산</div>
                <div class="stat-value work" id="work-val">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">개인용 자산</div>
                <div class="stat-value personal" id="personal-val">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">보안 격리</div>
                <div class="stat-value security" id="security-val">0</div>
            </div>
        </div>

        <div class="log-section">
            <h2>최근 활동 로그 (Latest Activity)</h2>
            <table>
                <thead>
                    <tr>
                        <th>시간</th>
                        <th>자산명</th>
                        <th>분류</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('total-val').innerText = data.total;
                document.getElementById('work-val').innerText = data.work;
                document.getElementById('personal-val').innerText = data.personal;
                document.getElementById('security-val').innerText = data.security;

                const tbody = document.getElementById('log-body');
                tbody.innerHTML = '';
                
                data.recent.reverse().forEach(log => {
                    const row = document.createElement('tr');
                    const categoryClass = log.category === 'Work' ? 'bg-work' : 
                                         (log.category === 'Personal' ? 'bg-personal' : 'bg-security');
                    
                    row.innerHTML = `
                        <td>${new Date(log.timestamp).toLocaleString()}</td>
                        <td>${log.name}</td>
                        <td><span class="badge ${categoryClass}">${log.category}</span></td>
                        <td>${log.security_warning ? '⚠️ Isolated' : '✅ Safe'}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error('Error fetching stats:', err);
            }
        }

        // Initial fetch
        fetchStats();
        // Auto refresh every 10 seconds
        setInterval(fetchStats, 10000);
    </script>
</body>
</html>
